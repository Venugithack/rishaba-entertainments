    <rect x="386" y="16" width="8" height="12" rx="2"/><rect x="386" y="48" width="8" height="12" rx="2"/><rect x="386" y="80" width="8" height="12" rx="2"/><rect x="386" y="112" width="8" height="12" rx="2"/><rect x="386" y="144" width="8" height="12" rx="2"/><rect x="386" y="176" width="8" height="12" rx="2"/><rect x="386" y="208" width="8" height="12" rx="2"/><rect x="386" y="240" width="8" height="12" rx="2"/><rect x="386" y="272" width="8" height="12" rx="2"/><rect x="386" y="304" width="8" height="12" rx="2"/><rect x="386" y="336" width="8" height="12" rx="2"/><rect x="386" y="368" width="8" height="12" rx="2"/><rect x="386" y="400" width="8" height="12" rx="2"/><rect x="386" y="432" width="8" height="12" rx="2"/><rect x="386" y="464" width="8" height="12" rx="2"/><rect x="386" y="496" width="8" height="12" rx="2"/><rect x="386" y="528" width="8" height="12" rx="2"/><rect x="386" y="560" width="8" height="12" rx="2"/>
