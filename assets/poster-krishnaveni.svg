  <rect x="160" y="428" width="80" height="2" fill="#d9b877"/>

  <text x="200" y="462" text-anchor="middle" fill="#c3bda9" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" letter-spacing="3">TAMIL OTT DRAMA</text>

  <text x="200" y="566" text-anchor="middle" fill="#837e70" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="600" letter-spacing="4">RISHABA ENTERTAINMENTS</text>
