  <g transform="translate(200 190)" stroke="url(#rRing)" fill="none" stroke-width="2.4" stroke-linecap="round">
    <path d="M-64 -30 C -30 -6, -30 -6, 0 -30 C 30 -54, 30 -54, 64 -30"/>
