<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600" role="img" aria-label="Krishnaveni series poster">
  <defs>
    <linearGradient id="rBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#231c16"/>
      <stop offset="0.5" stop-color="#12110e"/>
      <stop offset="1" stop-color="#0a0805"/>
    </linearGradient>
    <radialGradient id="rGlow" cx="0.5" cy="0.27" r="0.62">
      <stop offset="0" stop-color="#d9b877" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#d9b877" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="rRing" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e7d3a3"/>
      <stop offset="1" stop-color="#8a6b35"/>
    </linearGradient>
  </defs>

  <rect width="400" height="600" fill="url(#rBg)"/>
  <rect width="400" height="600" fill="url(#rGlow)"/>

  <g fill="#000000" opacity="0.55">
